<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title id="pageTitle">Product Detail – Siyin Neoprene</title>
<meta name="description" id="metaDesc" content="Siyin neoprene product details">
<link rel="stylesheet" href="css/style.css">
<style>
.pd-layout{display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:start;margin-bottom:64px}
/* Image gallery */
.gallery{display:flex;flex-direction:column;gap:12px;position:sticky;top:88px}
.main-img{aspect-ratio:1;border-radius:14px;overflow:hidden;background:var(--gray-lt);border:1px solid var(--gray-bd);cursor:zoom-in}
.main-img img{width:100%;height:100%;object-fit:cover;transition:transform .4s}
.main-img:hover img{transform:scale(1.04)}
.main-img .placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:80px}
.thumb-row{display:flex;gap:8px}
.thumb{width:70px;height:70px;border-radius:8px;overflow:hidden;border:2px solid var(--gray-bd);cursor:pointer;transition:border-color .18s;flex-shrink:0;background:var(--gray-lt)}
.thumb:hover,.thumb.active{border-color:var(--blue)}
.thumb img{width:100%;height:100%;object-fit:cover}
/* Info */
.pd-info{}
.pd-cats{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.pd-cat{font-size:11.5px;font-weight:600;color:var(--blue);background:var(--blue-bg);padding:3px 10px;border-radius:20px}
.pd-name{font-size:clamp(22px,3vw,34px);font-weight:900;color:var(--text);margin-bottom:6px;line-height:1.2}
.pd-name-cn{font-size:16px;color:var(--mid);margin-bottom:16px}
.pd-desc{font-size:15px;color:var(--mid);line-height:1.8;margin-bottom:24px}
.pd-feat-tags{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:24px}
.pd-feat{display:flex;align-items:center;gap:5px;padding:5px 12px;background:var(--gray-lt);border:1px solid var(--gray-bd);border-radius:20px;font-size:12.5px;font-weight:500;color:var(--text)}
.pd-spec-table{width:100%;border-collapse:collapse;margin-bottom:28px;border-radius:10px;overflow:hidden;border:1px solid var(--gray-bd)}
.pd-spec-table tr:nth-child(even){background:var(--gray-lt)}
.pd-spec-table td{padding:10px 14px;font-size:13.5px;border-bottom:1px solid var(--gray-bd)}
.pd-spec-table td:first-child{font-weight:600;color:var(--text);width:42%;background:var(--gray-lt)}
.pd-spec-table td:last-child{color:var(--mid)}
.pd-spec-table tr:last-child td{border-bottom:none}
.pd-actions{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.pd-trust{display:flex;gap:16px;flex-wrap:wrap;padding:14px 0;border-top:1px solid var(--gray-bd);margin-top:8px}
.pd-trust-item{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--mid)}
.pd-trust-item svg{width:14px;height:14px;stroke:var(--green);fill:none;stroke-width:2.5}
/* ── 合并后的详情区块（无标签页）── */
.details-block {
  margin-bottom: 40px;
  border-top: 1px solid var(--gray-bd);
  padding-top: 40px;
}
.details-block:first-of-type {
  border-top: none;
  padding-top: 0;
}
.details-title {
  font-size: 20px;
  font-weight: 800;
  color: var(--text);
  margin-bottom: 20px;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--blue);
  display: inline-block;
}
.details-content {
  font-size: 15px;
  color: var(--mid);
  line-height: 1.8;
}
/* Video */
.video-wrap{position:relative;padding-bottom:56.25%;height:0;border-radius:12px;overflow:hidden;max-width:720px}
.video-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:none}
/* Related */
.related-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.rel-card{border:1px solid var(--gray-bd);border-radius:10px;overflow:hidden;cursor:pointer;transition:all .22s;display:block;color:inherit}
.rel-card:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(0,0,0,.1)}
.rel-img{height:130px;background:var(--gray-lt);overflow:hidden}
.rel-img img{width:100%;height:100%;object-fit:cover}
.rel-body{padding:12px 13px}
.rel-name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:3px}
.rel-spec{font-size:11.5px;color:var(--muted)}
/* Lightbox */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:9000;display:none;align-items:center;justify-content:center;padding:20px}
.lightbox.open{display:flex}
.lightbox img{max-width:90vw;max-height:90vh;object-fit:contain;border-radius:8px}
.lightbox-close{position:absolute;top:16px;right:20px;color:#fff;font-size:28px;cursor:pointer;background:rgba(255,255,255,.1);width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.lightbox-prev,.lightbox-next{position:absolute;top:50%;transform:translateY(-50%);color:#fff;font-size:24px;cursor:pointer;background:rgba(255,255,255,.1);width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background .2s}
.lightbox-prev:hover,.lightbox-next:hover{background:rgba(255,255,255,.25)}
.lightbox-prev{left:16px}
.lightbox-next{right:16px}
/* 返回按钮 */
.back-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--blue);
  font-size: 13px;
  font-weight: 500;
  text-decoration: none;
  margin-right: 20px;
}
.back-link:hover {
  gap: 10px;
}
.back-link svg {
  width: 14px;
  height: 14px;
  stroke: currentColor;
  fill: none;
  stroke-width: 2.5;
}
.breadcrumb-wrapper {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
}
</style>
</head>
<body>
<div id="topbar"></div>
<div id="nav"></div>

<!-- Page hero (dynamic) -->
<div style="background:var(--gray-lt);padding:16px 0;border-bottom:1px solid var(--gray-bd)">
  <div class="container">
    <div class="breadcrumb-wrapper">
      <!-- 返回按钮 -->
      <a href="javascript:history.back()" class="back-link">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        Back
      </a>
      <div class="breadcrumb" id="pdBreadcrumb">
        <a href="index.html">Home</a>
        <span class="breadcrumb-sep">›</span>
        <a href="products.html">Products</a>
        <span class="breadcrumb-sep">›</span>
        <span id="pdBreadcrumbName">Loading…</span>
      </div>
    </div>
  </div>
</div>

<section class="section">
  <div class="container">
    <div class="pd-layout" id="pdLayout">
      <div style="padding:48px;text-align:center;color:var(--muted)" id="pdLoading">Loading product…</div>
    </div>

    <!-- 合并后的详情区块（无标签页） -->
    <div id="detailsContainer" style="display:none">
      <!-- Full Description 区块 -->
      <div class="details-block">
        <div class="details-title">📄 Product Description</div>
        <div class="details-content" id="panelDesc"></div>
      </div>

      <!-- Technical Specs 区块 -->
      <div class="details-block">
        <div class="details-title">🔧 Technical Specifications</div>
        <div class="details-content" id="panelSpecs"></div>
      </div>

      <!-- Video / Media 区块（如果没有视频则不显示） -->
      <div class="details-block" id="videoBlock" style="display:none">
        <div class="details-title">🎬 Video & Media</div>
        <div class="details-content" id="panelVideo"></div>
      </div>
    </div>

    <!-- Related Products -->
    <div id="relatedSection" style="margin-top:56px;display:none">
      <h3 style="font-size:20px;font-weight:800;color:var(--text);margin-bottom:24px">Related Products</h3>
      <div class="related-grid" id="relatedGrid"></div>
    </div>
  </div>
</section>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <div class="lightbox-close" onclick="closeLightbox()">✕</div>
  <div class="lightbox-prev" onclick="lightboxNav(-1,event)">‹</div>
  <img id="lightboxImg" src="" alt="">
  <div class="lightbox-next" onclick="lightboxNav(1,event)">›</div>
</div>

<div id="footer"></div>
<script src="js/components.js"></script>
<script>
// ── DB helper (mirrors admin) ──
const DB = {
  get(k){ try{ return JSON.parse(localStorage.getItem('siyin_'+k)||'null'); }catch(e){ return null; } }
};

const FEATURE_LABELS = {
  waterproof:'💧 Waterproof', stretch:'↔️ Stretch', thermal:'🌡️ Thermal Insulation',
  shock:'🛡️ Shock Absorption', breathable:'🌬️ Breathable', embossed:'🔲 Embossed Surface',
  printed:'🖨️ Custom Printed', oem:'🏭 OEM Available', lowmoq:'📦 Low MOQ',
  fastsample:'⚡ Fast Sampling', eco:'🌿 Eco-Friendly', certified:'✅ SGS Certified'
};

let currentProduct = null;
let activeImgIdx = 0;
let lightboxImgs = [];
let lightboxIdx = 0;

function catName(id){
  const cats = DB.get('categories')||[];
  const c = cats.find(x=>x.id===id);
  return c ? c.name : id;
}

function loadProduct(){
  const params = new URLSearchParams(location.search);
  const id = params.get('id');
  if(!id){ showError('No product ID specified'); return; }

  const prods = DB.get('products')||[];
  const p = prods.find(x=>x.id===id);
  if(!p){ showError('Product not found'); return; }
  currentProduct = p;

  // SEO
  document.title = (p.seo_title||p.name) + ' – Siyin Neoprene';
  document.getElementById('metaDesc').content = p.seo_desc||p.desc||'';
  document.getElementById('pageTitle').textContent = p.name + ' – Siyin Neoprene';
  document.getElementById('pdBreadcrumbName').textContent = p.name;

  // Build layout
  const imgs = p.images||[];
  const feats = (p.features||[]).map(f=>FEATURE_LABELS[f]).filter(Boolean);
  const customTags = (p.custom_tags||'').split(',').map(t=>t.trim()).filter(Boolean);

  // Specs table rows
  const mainSpecs = [
    ['Neoprene Grade', p.grade],
    ['Thickness', p.thickness],
    ['Surface Fabric', p.fabric],
    ['Lamination Type', p.lam_type],
    ['Width', p.width],
    ['Color Options', p.color],
    ['MOQ', p.moq],
    ['Sample Lead Time', p.sample_time],
    ['Production Lead Time', p.lead_time],
    ['Certifications', p.certs],
    ['Applications', p.applications],
  ].filter(r=>r[1]);

  const customSpecs = (p.specs||[]).filter(s=>s.key&&s.val);

  const allSpecs = [...mainSpecs, ...customSpecs.map(s=>[s.key,s.val])];

  document.getElementById('pdLayout').innerHTML = `
    <!-- Gallery -->
    <div class="gallery">
      <div class="main-img" onclick="openLightbox(${activeImgIdx})" id="mainImg">
        ${imgs[0]?`<img src="${imgs[0]}" alt="${p.name}" id="mainImgEl">`:`<div class="placeholder">📦</div>`}
      </div>
      ${imgs.length>1?`<div class="thumb-row">${imgs.map((img,i)=>`
        <div class="thumb${i===0?' active':''}" onclick="switchImg(${i})" id="thumb${i}">
          <img src="${img}" alt="Image ${i+1}">
        </div>`).join('')}</div>`:''}
    </div>

    <!-- Info -->
    <div class="pd-info">
      <div class="pd-cats">
        ${p.category?`<span class="pd-cat">${catName(p.category)}</span>`:''}
        ${p.subcategory?`<span class="pd-cat" style="background:#f0fdf4;color:var(--green)">${catName(p.subcategory)}</span>`:''}
        ${p.featured?'<span class="pd-cat" style="background:#fefce8;color:#a16207">⭐ Best Seller</span>':''}
      </div>
      <h1 class="pd-name">${p.name}</h1>
      ${p.name_cn?`<div class="pd-name-cn">${p.name_cn}</div>`:''}
      ${p.desc?`<p class="pd-desc">${p.desc}</p>`:''}
      ${feats.length||customTags.length?`
        <div class="pd-feat-tags">
          ${feats.map(f=>`<span class="pd-feat">${f}</span>`).join('')}
          ${customTags.map(t=>`<span class="pd-feat">🏷️ ${t}</span>`).join('')}
        </div>`:''}
      ${allSpecs.length?`
        <table class="pd-spec-table">
          ${allSpecs.map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('')}
        </table>`:''}
      <div class="pd-actions">
        <a href="contact.html?t=quote&product=${encodeURIComponent(p.name)}" class="btn btn-blue btn-lg">
          <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
          Get a Quote
        </a>
        <a href="contact.html?t=sample&product=${encodeURIComponent(p.name)}" class="btn btn-outline btn-lg">
          Request Sample
        </a>
        ${p.pdf?`<a href="${p.pdf}" target="_blank" class="btn btn-gray btn-lg">📄 Tech Sheet</a>`:''}
      </div>
      <div class="pd-trust">
        <div class="pd-trust-item"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>3–7 day sampling</div>
        <div class="pd-trust-item"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>ISO 9001 Certified</div>
        <div class="pd-trust-item"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Low MOQ accepted</div>
        <div class="pd-trust-item"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Reply in 24h</div>
      </div>
    </div>`;

  lightboxImgs = imgs;

  // 显示详情容器
  document.getElementById('detailsContainer').style.display = 'block';

  // Full description
  document.getElementById('panelDesc').innerHTML = p.desc_full
    ? `<div style="font-size:15px;color:var(--mid);line-height:1.9;max-width:800px">${p.desc_full.replace(/\n/g,'<br>')}</div>`
    : `<p style="color:var(--muted);font-size:14px">No detailed description added yet. <a href="contact.html" style="color:var(--blue)">Contact us</a> for full product details.</p>`;

  // Specs tab
  document.getElementById('panelSpecs').innerHTML = allSpecs.length
    ? `<div style="max-width:600px"><table class="pd-spec-table">${allSpecs.map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('')}</table></div>`
    : `<p style="color:var(--muted);font-size:14px">Contact us for detailed technical specifications.</p>`;

  // Video tab - 如果有视频才显示区块
  if (p.video && p.video.trim()) {
    const videoBlock = document.getElementById('videoBlock');
    videoBlock.style.display = 'block';
    document.getElementById('panelVideo').innerHTML = `<div style="max-width:720px"><div class="video-wrap"><iframe src="${getYouTubeEmbed(p.video)}" allowfullscreen></iframe></div></div>`;
  } else {
    document.getElementById('videoBlock').style.display = 'none';
  }

  // Related products
  const related = (DB.get('products')||[])
    .filter(x=>x.id!==p.id && (x.category===p.category||x.subcategory===p.category) && x.status==='active')
    .slice(0,4);
  if(related.length){
    document.getElementById('relatedSection').style.display='block';
    document.getElementById('relatedGrid').innerHTML = related.map(r=>`
      <a class="rel-card" href="product-detail.html?id=${r.id}">
        <div class="rel-img">${r.images?.[0]?`<img src="${r.images[0]}" alt="${r.name}">`:''}</div>
        <div class="rel-body">
          <div class="rel-name">${r.name}</div>
          <div class="rel-spec">${[r.grade,r.thickness].filter(Boolean).join(' · ')||catName(r.category)}</div>
        </div>
      </a>`).join('');
  }
}

function switchImg(idx){
  activeImgIdx = idx;
  const imgs = currentProduct?.images||[];
  const mainEl = document.getElementById('mainImgEl');
  if(mainEl) mainEl.src = imgs[idx];
  document.querySelectorAll('.thumb').forEach((t,i)=>t.classList.toggle('active',i===idx));
}

function openLightbox(idx){
  lightboxIdx = idx;
  if(!lightboxImgs.length) return;
  document.getElementById('lightboxImg').src = lightboxImgs[idx];
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox(e){
  if(!e||e.target===document.getElementById('lightbox')||e.type==='click'){
    document.getElementById('lightbox').classList.remove('open');
  }
}
function lightboxNav(dir, e){
  if(e) e.stopPropagation();
  lightboxIdx = (lightboxIdx + dir + lightboxImgs.length) % lightboxImgs.length;
  document.getElementById('lightboxImg').src = lightboxImgs[lightboxIdx];
}

function getYouTubeEmbed(url){
  const match = url.match(/(?:youtu\.be\/|v=)([^&\s]+)/);
  return match ? `https://www.youtube.com/embed/${match[1]}` : url;
}

function showError(msg){
  document.getElementById('pdLayout').innerHTML = `
    <div style="grid-column:1/-1;padding:64px;text-align:center;color:var(--muted)">
      <div style="font-size:48px;margin-bottom:12px">😕</div>
      <div style="font-size:16px;font-weight:600;color:var(--text);margin-bottom:8px">${msg}</div>
      <a href="products.html" class="btn btn-outline" style="margin-top:12px">← Back to Products</a>
    </div>`;
}

document.addEventListener('DOMContentLoaded', loadProduct);
</script>
</body>
</html>
