<body>
<div id="topbar"></div>

<!-- Page hero - 保持你的原有内容 -->
<div class="page-hero">
  <div class="container page-hero-inner">

      <a href="index.html">Home</a><span class="breadcrumb-sep">›</span>
      <span id="bcrumb">Products</span>
    </div>
    <h1 id="heroTitle">Our Products</h1>
    <p style="color:rgba(255,255,255,.72);font-size:15px;max-width:520px;margin-top:8px">
      Premium neoprene &amp; laminated fabric for wetsuits, bottle sleeves, footwear, sports supports and more.
    </p>
  </div>
</div>

<div class="prods-wrap">
  <!-- Left: Category sidebar -->
  <aside class="cats-sidebar" id="catsSidebar"></aside>

  <!-- Right: Products -->
  <main class="prods-main">
    <div class="pm-head">
      <div class="pm-head-top">
        <div>
          <div class="pm-cat-title" id="catTitle">All Products</div>
          <div class="pm-cat-desc" id="catDesc"></div>
        </div>
        <a href="contact.html?t=sample" class="btn btn-blue btn-sm">Request Free Sample →</a>
      </div>
      <div class="subcats-chips" id="subcatChips" style="display:none"></div>
      <div class="pm-toolbar">
        <div class="pm-search">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="srch" placeholder="Search products, materials, grades…" oninput="renderProds()">
        </div>
        <div class="pm-sort">
          <select id="sortSel" onchange="renderProds()">
            <option value="default">Default Sort</option>
            <option value="name">Name A–Z</option>
            <option value="feat">Featured First</option>
          </select>
        </div>
        <div class="pm-count" id="pmCount"></div>
      </div>
    </div>
    <div id="catIntroBox" style="display:none"></div>
    <div class="pg" id="prodGrid"></div>
    <div class="prods-cta-strip" id="ctaStrip" style="display:none">
      <div class="pcs-text">
        <strong>Can't find what you need?</strong>
        <span>We do custom OEM — send us your spec or drawing for a free review.</span>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <a href="contact.html?t=quote" class="btn btn-blue">Get a Quote</a>
        <a href="contact.html?t=sample" class="btn btn-outline">Request Sample</a>
      </div>
    </div>
  </main>
</div>

<div id="footer"></div>
<script src="js/components.js"></script>
<script>
// ============================================
// 只修改这部分：让 products 从 localStorage 读取数据
// ============================================

// 数据读取
function getProdsFromStorage() {
  try {
    const data = localStorage.getItem('siyin_products');
    return data ? JSON.parse(data) : [];
  } catch(e) {
    return [];
  }
}

// 分类数据（保持你原来的）
const DEFAULT_CATS = [
  {id:'c1',name:'Neoprene Fabric',icon:'🧴',parent:'root',order:1,desc:'Raw neoprene foam in SBR, SCR and CR grades. Closed-cell structure, consistent density, available 1.5–12mm.'},
  {id:'c1a',name:'SBR Neoprene',icon:'⚫',parent:'c1',order:1},
  {id:'c1b',name:'SCR Neoprene',icon:'⚫',parent:'c1',order:2},
  {id:'c1c',name:'CR Neoprene',icon:'⚫',parent:'c1',order:3},
  {id:'c1d',name:'Laminated Neoprene',icon:'📋',parent:'c1',order:4},
  {id:'c2',name:'Laminated Neoprene Fabric',icon:'🔗',parent:'root',order:2,desc:'Neoprene bonded with various surface fabrics. Ideal for wetsuits, sports gear, bottle sleeves, bags and more. Custom combinations available.'},
  {id:'c2a',name:'Polyester Lamination',icon:'🧵',parent:'c2',order:1},
  {id:'c2b',name:'Spandex Lamination',icon:'🧵',parent:'c2',order:2},
  {id:'c2c',name:'Lycra Lamination',icon:'🧵',parent:'c2',order:3},
  {id:'c2d',name:'Jersey Lamination',icon:'🧵',parent:'c2',order:4},
  {id:'c2e',name:'OK Fabric Lamination',icon:'🧵',parent:'c2',order:5},
  {id:'c2f',name:'Mesh Lamination',icon:'🧵',parent:'c2',order:6},
  {id:'c2g',name:'TPU Lamination',icon:'🧵',parent:'c2',order:7},
  {id:'c2h',name:'Velvet Lamination',icon:'🧵',parent:'c2',order:8},
  {id:'c3',name:'Application Materials',icon:'🎯',parent:'root',order:3,desc:'Materials selected and optimised for specific end-use applications. Tell us your product — we recommend the right grade and lamination.'},
  {id:'c3a',name:'Wetsuit Material',icon:'🤿',parent:'c3',order:1},
  {id:'c3b',name:'Cup Sleeve Material',icon:'🥤',parent:'c3',order:2},
  {id:'c3c',name:'Footwear Material',icon:'👟',parent:'c3',order:3},
  {id:'c3d',name:'Sports Support Material',icon:'💪',parent:'c3',order:4},
  {id:'c3e',name:'Bag Material',icon:'👜',parent:'c3',order:5},
  {id:'c3f',name:'Medical Support Material',icon:'🏥',parent:'c3',order:6},
  {id:'c3g',name:'Fitness Product Material',icon:'🏋️',parent:'c3',order:7},
  {id:'c4',name:'Functional Fabric',icon:'⚡',parent:'root',order:4,desc:'Neoprene with specific performance properties — waterproof, high-stretch, thermal insulation, embossed textures and more.'},
  {id:'c4a',name:'Waterproof',icon:'💧',parent:'c4',order:1},
  {id:'c4b',name:'Stretch',icon:'↔️',parent:'c4',order:2},
  {id:'c4c',name:'Thermal Insulation',icon:'🌡️',parent:'c4',order:3},
  {id:'c4d',name:'Shock Absorption',icon:'🛡️',parent:'c4',order:4},
  {id:'c4e',name:'Breathable',icon:'🌬️',parent:'c4',order:5},
  {id:'c4f',name:'Embossed',icon:'🔲',parent:'c4',order:6},
  {id:'c4g',name:'Printed',icon:'🖨️',parent:'c4',order:7},
  {id:'c5',name:'Surface Fabric Options',icon:'🎨',parent:'root',order:5,desc:'Choose the right surface fabric for lamination: lycra, jersey, OK fabric, mesh, satin, velvet and more.'},
  {id:'c5a',name:'Lycra Fabric',icon:'🔵',parent:'c5',order:1},
  {id:'c5b',name:'T Fabric',icon:'🔵',parent:'c5',order:2},
  {id:'c5c',name:'Jersey Fabric',icon:'🔵',parent:'c5',order:3},
  {id:'c5d',name:'OK Fabric',icon:'🔵',parent:'c5',order:4},
  {id:'c5e',name:'Mesh Fabric',icon:'🔵',parent:'c5',order:5},
  {id:'c5f',name:'Satin Fabric',icon:'🔵',parent:'c5',order:6},
  {id:'c5g',name:'Milk Silk Fabric',icon:'🔵',parent:'c5',order:7},
  {id:'c5h',name:'Velvet Fabric',icon:'🔵',parent:'c5',order:8},
  {id:'c5i',name:'Brushed Fabric',icon:'🔵',parent:'c5',order:9},
  {id:'c6',name:'OEM & Custom Solutions',icon:'🏭',parent:'root',order:6,desc:'Full OEM/ODM service — custom thickness, custom lamination, custom color, private label. Send your drawing for a free review.'},
  {id:'c6a',name:'Custom Thickness',icon:'📏',parent:'c6',order:1},
  {id:'c6b',name:'Custom Lamination',icon:'📐',parent:'c6',order:2},
  {id:'c6c',name:'Custom Color',icon:'🎨',parent:'c6',order:3},
  {id:'c6d',name:'Sample Development',icon:'🔬',parent:'c6',order:4},
  {id:'c7',name:'Best Sellers',icon:'⭐',parent:'root',order:7,desc:'Our most popular neoprene materials — trusted by buyers in 30+ countries.'},
];

// 其他函数和你原来的一样，只需要修改 getProds 来源
function getCats() { 
  // 如果 localStorage 有分类就用，否则用默认
  try {
    const stored = localStorage.getItem('siyin_categories');
    return stored ? JSON.parse(stored) : DEFAULT_CATS;
  } catch(e) {
    return DEFAULT_CATS;
  }
}
function getProds() { return getProdsFromStorage(); }
function catById(id) { return getCats().find(c => c.id === id); }
function catName(id) { const c = catById(id); return c ? c.name : ''; }
function childrenOf(pid) { return getCats().filter(c => c.parent === pid).sort((a,b) => a.order-b.order); }
function allDesc(pid) { 
  const d = childrenOf(pid);
  let all = [...d];
  d.forEach(c => { all = all.concat(allDesc(c.id)); });
  return all;
}
function countCat(cid) {
  const ps = getProds();
  const ids = new Set([cid, ...allDesc(cid).map(c => c.id)]);
  return ps.filter(p => p.status !== 'draft' && (ids.has(p.category) || ids.has(p.subcategory))).length;
}

const FEAT_LABELS = {
  waterproof:'💧 Waterproof', stretch:'↔️ Stretch', thermal:'🌡️ Thermal',
  shock:'🛡️ Shock Absorb', breathable:'🌬️ Breathable', embossed:'🔲 Embossed',
  printed:'🖨️ Printed', oem:'🏭 OEM', lowmoq:'📦 Low MOQ', fastsample:'⚡ Fast Sample',
  certified:'✅ SGS', eco:'🌿 Eco'
};

let selCatId = '__all__';

function renderSidebar() {
  const cats = getCats();
  const roots = childrenOf('root');
  const total = getProds().filter(p => p.status !== 'draft').length;
  const allOn = selCatId === '__all__';

  let html = `<div class="cs-title">Categories</div>
    <div class="cs-all${allOn ? ' on' : ''}" onclick="selCat('__all__')">
      <span style="font-size:14px">📋</span>
      <span class="cs-all-name">All Products</span>
      <span class="cs-all-cnt">${total}</span>
    </div>
    <div style="height:8px"></div>`;

  roots.forEach(root => {
    const kids = childrenOf(root.id);
    const cnt = countCat(root.id);
    const isRootSel = selCatId === root.id;
    const isAncSel = allDesc(root.id).some(c => c.id === selCatId);
    const open = isRootSel || isAncSel;

    html += `<div class="cs-group">
      <div class="cs-parent${isRootSel ? ' on' : ''}" onclick="selCat('${root.id}')">
        ${kids.length ? `<span class="cp-arrow${open ? ' open' : ''}" onclick="toggleCat(event,'${root.id}')">▶</span>` : '<span class="cp-arrow hide">▶</span>'}
        <span class="cp-icon">${root.icon || '📁'}</span>
        <span class="cp-name">${root.name}</span>
        ${cnt > 0 ? `<span class="cp-cnt">${cnt}</span>` : ''}
      </div>
      ${kids.length ? `<div class="cs-children${open ? ' open' : ''}" id="ch_${root.id}">
        ${kids.map(child => {
          const childCnt = countCat(child.id);
          const isSel = selCatId === child.id;
          return `<div class="cs-child${isSel ? ' on' : ''}" onclick="selCat('${child.id}')">
            <span class="cc-icon">${child.icon || '•'}</span>
            <span class="cc-name">${child.name}</span>
            ${childCnt > 0 ? `<span class="cc-cnt">${childCnt}</span>` : ''}
          </div>`;
        }).join('')}
      </div>` : ''}
    </div>`;
  });

  document.getElementById('catsSidebar').innerHTML = html;
}

function toggleCat(e, id) {
  e.stopPropagation();
  const el = document.getElementById('ch_' + id);
  const arrow = el?.previousElementSibling?.querySelector('.cp-arrow');
  if (el) { el.classList.toggle('open'); arrow?.classList.toggle('open'); }
}

function updateHead() {
  const cat = catById(selCatId);
  const isAll = selCatId === '__all__';

  document.getElementById('catTitle').textContent = isAll ? 'All Products' : (cat?.name || 'Products');
  document.getElementById('catDesc').textContent = isAll ? 'Full range of neoprene and laminated fabric products.' : (cat?.desc || '');
  document.getElementById('heroTitle').textContent = isAll ? 'Our Products' : (cat?.name || 'Products');
  document.getElementById('bcrumb').textContent = isAll ? 'Products' : (cat?.name || 'Products');

  const kids = isAll ? [] : childrenOf(selCatId);
  const chipsEl = document.getElementById('subcatChips');
  if (!isAll && kids.length) {
    chipsEl.style.display = 'flex';
    chipsEl.innerHTML = kids.map(k => `
      <div class="subcat-chip${selCatId === k.id ? ' on' : ''}" onclick="selCat('${k.id}')">
        ${k.icon} ${k.name}
      </div>`).join('');
  } else chipsEl.style.display = 'none';

  const introEl = document.getElementById('catIntroBox');
  if (!isAll && cat && cat.parent === 'root' && cat.desc && kids.length) {
    introEl.style.display = 'block';
    introEl.innerHTML = `<div class="cat-intro">
      <div class="cat-intro-icon">${cat.icon || '📦'}</div>
      <div>
        <h2>${cat.name}</h2>
        <p>${cat.desc}</p>
      </div>
    </div>`;
  } else introEl.style.display = 'none';
}

function getFiltered() {
  const prods = getProds().filter(p => p.status !== 'draft');
  const q = (document.getElementById('srch')?.value || '').toLowerCase();
  const sort = document.getElementById('sortSel')?.value || 'default';

  let list = prods.filter(p => {
    if (selCatId !== '__all__') {
      const valid = new Set([selCatId, ...allDesc(selCatId).map(c => c.id)]);
      if (!valid.has(p.category) && !valid.has(p.subcategory)) return false;
    }
    if (q) {
      const hay = [p.name, p.name_cn, p.desc, p.grade, p.fabric, p.applications].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  if (sort === 'name') list.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
  else if (sort === 'feat') list.sort((a, b) => (b.featured ? 1 : 0) - (a.featured ? 1 : 0));

  return list;
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}

function renderProds() {
  const prods = getFiltered();
  document.getElementById('pmCount').textContent = `${prods.length} product${prods.length !== 1 ? 's' : ''}`;

  if (!prods.length) {
    document.getElementById('prodGrid').innerHTML = `
      <div class="prods-empty">
        <div class="ei">📦</div>
        <div class="et">No products in this category yet</div>
        <p style="font-size:13px;margin-bottom:16px">Check back soon, or contact us with your requirements.</p>
        <a href="contact.html" class="btn btn-blue">Send Inquiry →</a>
      </div>`;
    document.getElementById('ctaStrip').style.display = 'none';
    return;
  }
  document.getElementById('ctaStrip').style.display = 'flex';

  document.getElementById('prodGrid').innerHTML = prods.map(p => {
    const img = p.images && p.images[0];
    const cat = catName(p.category);
    const feats = (p.features || []).slice(0, 3).map(f => FEAT_LABELS[f]).filter(Boolean);
    const specs = [p.grade, p.thickness, p.fabric].filter(Boolean);
    const tags = [];
    if (p.featured) tags.push({ cls: 'hot', lbl: '⭐ Best Seller' });
    if ((p.features || []).includes('oem')) tags.push({ cls: 'oem', lbl: 'OEM' });

    return `<a class="pc" href="product-detail.html?id=${p.id}">
      <div class="pc-img">
        ${img ? `<img src="${escapeHtml(img)}" alt="${escapeHtml(p.name)}" onerror="this.parentElement.innerHTML='📦'">` : '📦'}
        ${tags.length ? `<div class="pc-badge">${tags.map(t => `<span class="pc-tag ${t.cls}">${t.lbl}</span>`).join('')}</div>` : ''}
      </div>
      <div class="pc-body">
        <div class="pc-cat">${escapeHtml(cat)}</div>
        <div class="pc-name">${escapeHtml(p.name)}</div>
        ${p.name_cn ? `<div class="pc-cn">${escapeHtml(p.name_cn)}</div>` : ''}
        ${specs.length ? `<div class="pc-spec">${specs.map(s => `<span class="pc-spec-item">${escapeHtml(s)}</span>`).join('')}</div>` : ''}
        ${feats.length ? `<div class="pc-feats">${feats.map(f => `<span class="pc-feat">${f}</span>`).join('')}</div>` : ''}
        <div class="pc-foot">
          <div class="pc-moq">${p.moq ? `MOQ: <strong>${escapeHtml(p.moq)}</strong>` : ''}</div>
          <div class="pc-cta">View Details <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg></div>
        </div>
      </div>
    </a>`;
  }).join('');
}

function selCat(id) {
  selCatId = id;
  renderSidebar();
  updateHead();
  renderProds();
  if (id !== '__all__') {
    const cat = catById(id);
    if (cat && cat.parent !== 'root') {
      const el = document.getElementById('ch_' + cat.parent);
      const arrow = el?.previousElementSibling?.querySelector('.cp-arrow');
      if (el) { el.classList.add('open'); arrow?.classList.add('open'); }
    }
  }
}

const urlCat = new URLSearchParams(location.search).get('cat');
if (urlCat) selCatId = urlCat;

document.addEventListener('DOMContentLoaded', () => {
  renderSidebar();
  updateHead();
  renderProds();
});
</script>
</body>
</html>
