<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard – Siyin Admin</title>
<link rel="stylesheet" href="admin.css">
<style>
.quick-actions{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.qa-btn{background:#fff;border:1px solid var(--bd);border-radius:10px;padding:18px 16px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;transition:all .2s;text-align:center;text-decoration:none;color:inherit}
.qa-btn:hover{border-color:var(--blue);box-shadow:0 4px 16px rgba(0,51,160,.1);transform:translateY(-2px)}
.qa-icon{font-size:28px}
.qa-label{font-size:12.5px;font-weight:600;color:var(--text)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
.grid-3{display:grid;grid-template-columns:2fr 1fr;gap:20px}
.activity-item{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--bd)}
.activity-item:last-child{border-bottom:none;padding-bottom:0}
.activity-dot{width:8px;height:8px;border-radius:50%;background:var(--blue);flex-shrink:0;margin-top:5px}
.activity-dot.green{background:var(--green)}
.activity-dot.yellow{background:var(--yellow)}
.activity-dot.red{background:var(--red)}
.activity-text{font-size:13px;color:var(--text);line-height:1.5}
.activity-time{font-size:11.5px;color:var(--muted);margin-top:2px}
.mini-chart{display:flex;align-items:flex-end;gap:6px;height:60px;padding:8px 0}
.bar{flex:1;background:var(--blue-bg);border-radius:4px 4px 0 0;transition:background .2s;cursor:pointer;position:relative}
.bar:hover{background:var(--blue)}
.bar-label{font-size:9px;color:var(--muted);text-align:center;margin-top:4px}
.product-quick{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--bd)}
.product-quick:last-child{border-bottom:none}
.pq-img{width:40px;height:40px;border-radius:7px;background:var(--bg);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.pq-name{font-size:13px;font-weight:600;color:var(--text)}
.pq-cat{font-size:11.5px;color:var(--muted)}
</style>
</head>
<body>
<div class="admin-shell">
  <div class="sidebar" id="sidebar"></div>
  <div class="main-area">
    <div class="topbar">
      <div class="topbar-left">
        <div>
          <div class="page-title">Dashboard</div>
          <div class="page-subtitle" id="dashDate"></div>
        </div>
      </div>
      <div class="topbar-right">
        <a href="../index.html" target="_blank" class="btn btn-ghost btn-sm">
          <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          View Website
        </a>
        <div class="topbar-btn" onclick="logout()" title="Logout">
          <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </div>
      </div>
    </div>
    <div class="page-content">

      <!-- Quick Actions -->
      <div class="quick-actions">
        <a href="products.html?action=new" class="qa-btn"><div class="qa-icon">📦</div><div class="qa-label">Add Product</div></a>
        <a href="inquiries.html" class="qa-btn"><div class="qa-icon">📬</div><div class="qa-label">View Inquiries</div></a>
        <a href="settings.html" class="qa-btn"><div class="qa-icon">⚙️</div><div class="qa-label">Site Settings</div></a>
        <a href="../index.html" target="_blank" class="qa-btn"><div class="qa-icon">🌐</div><div class="qa-label">Visit Website</div></a>
      </div>

      <!-- Stats -->
      <div class="stats-row" id="statsRow"></div>

      <!-- Main grid -->
      <div class="grid-3">
        <!-- Left: Recent inquiries -->
        <div class="card">
          <div class="card-header">
            <div class="card-title">Recent Inquiries</div>
            <a href="inquiries.html" class="btn btn-ghost btn-sm">View All →</a>
          </div>
          <div class="card-body" id="recentInquiries" style="padding:0">
            <table style="width:100%;border-collapse:collapse">
              <thead><tr>
                <th style="padding:10px 16px;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;border-bottom:1px solid var(--bd)">Name / Company</th>
                <th style="padding:10px 16px;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;border-bottom:1px solid var(--bd)">Product</th>
                <th style="padding:10px 16px;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;border-bottom:1px solid var(--bd)">Status</th>
                <th style="padding:10px 16px;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;border-bottom:1px solid var(--bd)">Time</th>
              </tr></thead>
              <tbody id="inqTableBody"></tbody>
            </table>
          </div>
        </div>

        <!-- Right: Quick product list + activity -->
        <div style="display:flex;flex-direction:column;gap:20px">
          <div class="card">
            <div class="card-header">
              <div class="card-title">Featured Products</div>
              <a href="products.html" class="btn btn-ghost btn-sm">Manage</a>
            </div>
            <div class="card-body" id="featuredProds" style="padding:4px 16px"></div>
          </div>
          <div class="card">
            <div class="card-header"><div class="card-title">Activity Log</div></div>
            <div class="card-body" id="activityLog" style="padding:4px 16px"></div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
<div id="toast"></div>
<script src="admin.js"></script>
<script>
function pageInit(){
  // Date
  document.getElementById('dashDate').textContent = new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

  const products = DB.get('products')||[];
  const inquiries = DB.get('inquiries')||[];
  const newInq = inquiries.filter(i=>i.status==='new').length;

  // Stats
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card">
      <div class="stat-card-top">
        <div class="stat-icon blue"><svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg></div>
        <span class="stat-change up">↑ Active</span>
      </div>
      <div class="stat-val">${products.length}</div>
      <div class="stat-lbl">Total Products</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-top">
        <div class="stat-icon ${newInq>0?'red':'green'}"><svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></div>
        ${newInq>0?`<span class="stat-change down">⚠ ${newInq} new</span>`:'<span class="stat-change up">✓ All handled</span>'}
      </div>
      <div class="stat-val">${inquiries.length}</div>
      <div class="stat-lbl">Total Inquiries</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-top">
        <div class="stat-icon green"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
        <span class="stat-change up">↑ Live</span>
      </div>
      <div class="stat-val">5</div>
      <div class="stat-lbl">Published Pages</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-top">
        <div class="stat-icon yellow"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
        <span class="stat-change up">↑ 3–7d</span>
      </div>
      <div class="stat-val">3–7d</div>
      <div class="stat-lbl">Sample Lead Time</div>
    </div>`;

  // Inquiries table
  const recent = [...inquiries].sort((a,b)=>b.created-a.created).slice(0,5);
  const statusMap = {new:'<span class="badge badge-red">New</span>',replied:'<span class="badge badge-green">Replied</span>',pending:'<span class="badge badge-yellow">Pending</span>',closed:'<span class="badge badge-gray">Closed</span>'};
  document.getElementById('inqTableBody').innerHTML = recent.map(inq=>`
    <tr style="cursor:pointer" onclick="window.location='inquiries.html'">
      <td><div style="font-size:13px;font-weight:600">${inq.name}</div><div style="font-size:11.5px;color:var(--muted)">${inq.company}</div></td>
      <td style="font-size:13px;color:var(--mid)">${inq.product||'—'}</td>
      <td>${statusMap[inq.status]||''}</td>
      <td style="font-size:12px;color:var(--muted)">${fmtDateTime(inq.created)}</td>
    </tr>`).join('');

  // Featured products
  const featured = products.filter(p=>p.featured).slice(0,4);
  document.getElementById('featuredProds').innerHTML = featured.map(p=>`
    <div class="product-quick">
      <div class="pq-img">${p.img?`<img src="${p.img}" style="width:100%;height:100%;object-fit:cover;border-radius:7px">`:'📦'}</div>
      <div style="flex:1;min-width:0">
        <div class="pq-name" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.name}</div>
        <div class="pq-cat">${p.category} · ${p.thickness}</div>
      </div>
      <span class="badge badge-green">Active</span>
    </div>`).join('') || '<div style="padding:16px;text-align:center;color:var(--muted);font-size:13px">No featured products</div>';

  // Activity log
  const activities = [
    {dot:'blue',text:'Dashboard accessed','time':fmtDateTime(Date.now())},
    {dot:'green',text:`${products.length} products in catalog`,time:fmtDate(Date.now())},
    {dot:newInq>0?'red':'green',text:newInq>0?`${newInq} new inquiries need reply`:'All inquiries handled',time:fmtDate(Date.now())},
    {dot:'yellow',text:'Site settings last updated',time:fmtDate(Date.now()-86400000)},
  ];
  document.getElementById('activityLog').innerHTML = activities.map(a=>`
    <div class="activity-item">
      <div class="activity-dot ${a.dot}"></div>
      <div><div class="activity-text">${a.text}</div><div class="activity-time">${a.time}</div></div>
    </div>`).join('');
}
</script>
</body>
</html>
